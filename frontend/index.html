<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/src/assets/logo.jpg" />
    <script>
      (function () {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = "/src/assets/logo.jpg";
        img.onload = () => {
          const size = 32;
          const c = document.createElement("canvas");
          c.width = c.height = size;
          const ctx = c.getContext("2d");
          ctx.drawImage(img, 0, 0, size, size);
          const data = c.toDataURL("image/png");
          let l = document.querySelector('link[rel="icon"]');
          if (!l) {
            l = document.createElement("link");
            l.rel = "icon";
            document.head.appendChild(l);
          }
          l.href = data;
        };
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Yum-Yum Cafe — Delicious Continental & African dishes across 4 Lagos locations. Order online, book a table, or visit us today."
    />
    <meta
      name="keywords"
      content="Yum-Yum Cafe, fast food Lagos, Nigerian restaurant, order food online Lagos, continental dishes Lagos"
    />
    <meta name="theme-color" content="#B91C1C" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Yum-Yum Cafe — Delicious Food in Lagos"
    />
    <meta
      property="og:description"
      content="Quick service restaurant offering Continental & African dishes across 4 Lagos locations."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yumyum-cafe.com.ng" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Staatliches&display=swap"
      rel="stylesheet"
    />

    <title>Yum-Yum Cafe — Delicious Food in Lagos</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
